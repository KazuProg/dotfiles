[settings]
idiomatic_version_file_enable_tools = ["python"]
experimental = true

[tools]
gh = "latest"
go = "latest"
herdr = "latest"
hunk = "latest"
jq = "latest"
node = "lts"
python = "latest"
shellcheck = "latest"
terraform = "latest"
tmux = "latest"
yq = "latest"

[hooks]
# NOTE: mise の postinstall hook は `mise install` でのみ発火し、`mise upgrade` では発火しない
# (jdx/mise src/cli/upgrade.rs に hook 呼び出しなし)。
# `mise upgrade` 対応は ~/.config/zsh/mise-refresh.zsh の shell 関数側で行う。
postinstall = '"${XDG_CONFIG_HOME:-$HOME/.config}/mise/refresh-tool-links.sh"'
