[settings]
idiomatic_version_file_enable_tools = ["python"]

[tools]
gh = "latest"
go = "latest"
herdr = "latest"
hunk = "latest"
jq = "latest"
node = "lts"
python = "latest"
shellcheck = "latest"
terraform = "latest"
tmux = "latest"
yq = "latest"

[hooks]
postinstall = '''
if echo "$MISE_INSTALLED_TOOLS" | jq -e '.[] | select(.name == "hunk")' > /dev/null; then
  src=$(dirname "$(hunk skill path)")
  mkdir -p ~/.claude/skills
  ln -sfn "$src" ~/.claude/skills/hunk-review
fi
'''
