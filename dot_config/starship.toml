add_newline = true

format = """
$hostname$directory$git_branch$git_status$python$nodejs
$character"""

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[container]
disabled = true

[directory]
style = "bold cyan"
truncate_to_repo = false
truncation_length = 100

[git_branch]
format = "[$symbol$branch]($style) "

[hostname]
format = "[$ssh_symbol$hostname]($style):"
style = "bold green"
